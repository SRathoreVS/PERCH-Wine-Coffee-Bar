# ── Nginx Reverse Proxy Config — PERCH ──────────────────────────
# Place at: /etc/nginx/sites-available/perch
# Enable: sudo ln -s /etc/nginx/sites-available/perch /etc/nginx/sites-enabled/

upstream perch_api {
    least_conn;
    server 127.0.0.1:5000;
    # If running multiple PM2 instances on different ports:
    # server 127.0.0.1:5001;
    # server 127.0.0.1:5002;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.perchbar.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS / API server
server {
    listen 443 ssl http2;
    server_name api.perchbar.com;

    # ── SSL ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.perchbar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.perchbar.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Body Size ─────────────────────────────
    client_max_body_size 10M;

    # ── Compression ───────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ── API Proxy ─────────────────────────────
    location /api/ {
        proxy_pass http://perch_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Socket.io ─────────────────────────────
    location /socket.io/ {
        proxy_pass http://perch_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── API Docs ──────────────────────────────
    location /api/docs {
        proxy_pass http://perch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Static Uploads ────────────────────────
    location /uploads/ {
        alias /var/www/perch/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Rate Limiting ─────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/m;
    limit_req zone=api burst=20 nodelay;
}
